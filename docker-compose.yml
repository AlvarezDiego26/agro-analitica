services:
  duckdb:
    image: duckdb/duckdb:latest
    container_name: agro-analitica-duckdb
    profiles:
      - tools
    env_file:
      - ./db/duckdb/runtime/.env
    stdin_open: true
    tty: true
    working_dir: /data
    entrypoint: ["sh", "-c"]
    command: ["sleep infinity"]
    volumes:
      - ./db/duckdb/runtime/data:/data
      - ./db/duckdb/runtime/scripts:/scripts
      - ./db/duckdb/runtime/sql:/sql
      - ./db/duckdb/validation:/validation

  duckdb-refresh:
    image: duckdb/duckdb:latest
    profiles:
      - jobs
    env_file:
      - ./db/duckdb/runtime/.env
    working_dir: /data
    entrypoint: ["sh", "/scripts/refresh-api-snapshot.sh"]
    volumes:
      - ./db/duckdb/runtime/data:/data
      - ./db/duckdb/runtime/scripts:/scripts
      - ./db/duckdb/runtime/sql:/sql
      - ./db/duckdb/validation:/validation

  api:
    build:
      context: ./api
    container_name: agro-analitica-api
    env_file:
      - ./api/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      API_PREFIX: /api
      DUCKDB_DATABASE_PATH: /app/db/duckdb/runtime/data/agro_api_snapshot.duckdb
      DUCKDB_INIT_SQL_PATH: /app/db/duckdb/runtime/sql/00-node-backend-init.sql
      DUCKDB_ACCESS_MODE: READ_ONLY
    ports:
      - "3001:3001"
    volumes:
      - ./db/duckdb/runtime:/app/db/duckdb/runtime
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s

  ui:
    build:
      context: ./ui
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
        INTERNAL_API_BASE_URL: http://api:3001
    container_name: agro-analitica-ui
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      INTERNAL_API_BASE_URL: http://api:3001
    ports:
      - "3000:3000"
